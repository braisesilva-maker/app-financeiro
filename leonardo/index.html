/* ===================== DADOS ===================== */
var EMBEDDED = [];

function folderOf(){

}

/* ===================== PCLOUD ===================== */
var PASTA="C:/Program Files/Git/CONTROLE CONTRATOS";

function api(met,params,cb,errCb){
  var q=[],k; params.auth=PC.auth;
  for(k in params) q.push(k+"="+encodeURIComponent(params[k]));
  var x=new XMLHttpRequest();
  x.open("GET","https://"+PC.host+"/"+met+"?"+q.join("&"),true);
  x.onreadystatechange=function(){
    if(x.readyState!==4)return;
    if(x.status!==200){ errCb("HTTP "+x.status); return; }
    var o=null; try{ o=JSON.parse(x.responseText); }catch(e){ errCb("resposta inválida"); return; }
    if(o.result!==0){
      if(o.result===1000||o.result===2000||o.result===2094||o.result===2095){ PC.auth=""; localStorage.removeItem(LSK+"_auth"); }
      errCb("pCloud erro "+o.result+(o.error?": "+o.error:"")); return;
    }
    cb(o);
  };
  x.onerror=function(){ errCb("sem conexão"); };
  x.send();
}
function loginPC(user,pass,cb,errCb){
  function tenta(host,depois){
    var x=new XMLHttpRequest();
    x.open("GET","https://"+host+"/userinfo?getauth=1&username="+encodeURIComponent(user)+"&password="+encodeURIComponent(pass),true);
    x.onreadystatechange=function(){
      if(x.readyState!==4)return;
      var o=null; try{ o=JSON.parse(x.responseText); }catch(e){}
      if(o&&o.result===0&&o.auth){ PC.host=host; PC.auth=o.auth; localStorage.setItem(LSK+"_host",host); localStorage.setItem(LSK+"_auth",o.auth); cb(); }
      else if(depois) depois(); else errCb(o&&o.error?o.error:"login falhou");
    };
    x.onerror=function(){ if(depois)depois(); else errCb("sem conexão"); };
    x.send();
  }
  tenta("api.pcloud.com",function(){ tenta("eapi.pcloud.com",null); });
}
function utf16leParaString(buf){
  var u8=new Uint8Array(buf),i=0;

function renderTotais(){
  var honT=0,honR=0,honA=0,honAtivo=0,honExec=0;
  var cliT=0,cliR=0,cliA=0;
  var gTotal=0,gRec=0,gAberto=0,gExec=0;
  var nAtivos=0,nExec=0,nQuit=0;
  for(var i=0;i<DATA.length;i++){ var a=DATA[i], s=calcStatus(a);
    if(s==="aberto")nAtivos++; else if(s==="execucao")nExec++; else nQuit++;
    var ps=a.parcelas||[], recA=0,abA=0,exA=0,vt=0;
    for(var j=0;j<ps.length;j++){ var p=ps[j], v=(+p.valor||0); vt+=v;
      if(p.status==="pago") recA+=v; else if(p.status==="aberto") abA+=v; else if(p.status==="execucao") exA+=v; }
    var ht=honTotal(a); if(ht==null)ht=0; if(ht>vt)ht=vt; var ct=vt-ht;
    var oRec=honRecebido(a); if(oRec==null) oRec=Math.min(recA,ht); if(oRec>ht)oRec=ht; if(oRec>recA)oRec=recA;
    var cRec=recA-oRec;
    var oA=Math.max(0,ht-oRec), cA=Math.max(0,ct-cRec);

    if(s==="execucao") honExec+=oA; else if(s==="aberto") honAtivo+=oA;

      rowT("Honorários totais (todos os acordos)",honT,"")+
      rowT("Já recebido",honR,"")+
      rowT("A receber (total)",honA,"esc")+
      rowT("↳ a receber em acordos ativos",honAtivo,"")+
      rowT("↳ a receber em execução (risco de calote)",honExec,"bad")+
      '</tbody></table></div>'+
    '<div class="sec"><h3>Clientes</h3><table><tbody>'+
      rowT("Total que é dos clientes",cliT,"")+
      rowT("Já repassado / recebido pelos clientes",cliR,"")+
      rowT("A receber pelos clientes",cliA,"cli")+
      '</tbody></table></div>'+
    '<div class="sec"><h3>Geral — movimentação de todos os acordos</h3><table><tbody>'+
      rowT("Valor total dos acordos",gTotal,"")+
      rowT("Já recebido (escritório + clientes)",gRec,"")+

  document.getElementById("viewTotais").innerHTML=h;

function round2(x){ return Math.round(x*100)/100; }
function addByFreq(d0,i,freq){
  if(freq==="semanal") return new Date(d0.getFullYear(),d0.getMonth(),d0.getDate()+7*i);
  if(freq==="quinzenal") return new Date(d0.getFullYear(),d0.getMonth(),d0.getDate()+14*i);
  if(freq==="anual") return new Date(d0.getFullYear()+i,d0.getMonth(),d0.getDate());
  return new Date(d0.getFullYear(),d0.getMonth()+i,d0.getDate());
}
function computeParc(px){ px=px||"n";
  var total=parseBR(gv(px+"_total")), qtd=pInt(gv(px+"_qtd")), freq=document.getElementById(px+"_freq").value;
  var d0=parseISO(brToISO(gv(px+"_data")))||todayD();
  var reg=document.getElementById(px+"_hreg").value, hval=gv(px+"_hval"), htipo=document.getElementById(px+"_htipo").value;
  if(isNaN(total)||total<=0||qtd<=0) return {ps:[]};
  var v=round2(total/qtd), S=0, metodo="", pc;
  if(reg==="tudo"){ S=total; metodo="tudo do escritório (100%)"; }
  else if(reg==="nada"){ S=0; metodo="tudo do cliente"; }
  else if(reg==="pct"){ pc=(parseFloat(String(hval).replace(",","."))||0)/100; S=round2(pc*total); metodo=Math.round(pc*100)+"% de cada parcela"; }
  else { /* primeiro */ if(htipo==="%"){ pc=(parseFloat(String(hval).replace(",","."))||0)/100; S=round2(pc*total); metodo="escritório primeiro ("+Math.round(pc*100)+"% do total)"; } else { S=round2(parseBR(hval)); if(isNaN(S))S=0; metodo="escritório primeiro (R$ "+money(S).replace("R$ ","")+")"; } }
  var ps=[], i, budget=S;
  for(i=0;i<qtd;i++){
    var d=addByFreq(d0,i,freq), iso2=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
    var honor=0, ben="cliente";
    if(reg==="tudo"){ honor=v; ben="escritorio"; }
    else if(reg==="nada"){ honor=0; ben="cliente"; }
    else if(reg==="pct"){ pc=(parseFloat(String(hval).replace(",","."))||0)/100; honor=round2(pc*v); ben=(honor<=0?"cliente":(honor>=v?"escritorio":"dividida")); }
    else { if(budget<=0){ honor=0; ben="cliente"; } else if(budget>=v){ honor=v; ben="escritorio"; budget=round2(budget-v); } else { honor=round2(budget); ben="dividida"; budget=0; } }
    ps.push({seq:i+1,numero:String(i+1),venc:iso2,venc_raw:fmtBR(iso2),status:"aberto",beneficiario:ben,valor:v,honor:honor,pagamento:"",pagamento_raw:"",obs:""});
  }
  var hs=0,cs=0; for(i=0;i<ps.length;i++){ hs+=ps[i].honor; cs+=(ps[i].valor-ps[i].honor); }
  return {ps:ps,total:total,v:v,honTot:round2(hs),cliTot:round2(cs),metodo:metodo,freq:freq};
}
function prev(px){ px=px||"n";
  var reg=document.getElementById(px+"_hreg").value, wrap=document.getElementById(px+"_hwrap"), lbl=document.getElementById(px+"_hlbl"), tsel=document.getElementById(px+"_htipo");
  wrap.style.display=(reg==="tudo"||reg==="nada")?"none":"";
  tsel.style.display=(reg==="primeiro")?"":"none";
  lbl.innerHTML=(reg==="pct")?"% de cada parcela que é do escritório":"Quanto é do escritório";
  var r=computeParc(px), h="";
  if(r.ps&&r.ps.length){
    for(var i=0;i<r.ps.length&&i<80;i++){ var p=r.ps[i];
      var dest=p.beneficiario==="escritorio"?"<b>escritório</b>":(p.beneficiario==="cliente"?"cliente":("<b>DIVIDIDA</b> — escritório "+money(p.honor)+" / cliente "+money(p.valor-p.honor)));
      h+=p.numero+") "+fmtBR(p.venc)+" — "+money(p.valor)+" · "+dest+"<br>";
    }
    h+='<br><b>Total honorários (escritório): '+money(r.honTot)+' &nbsp;·&nbsp; Total do cliente: '+money(r.cliTot)+'</b>';
  } else h="Preencha o valor total e o nº de parcelas.";
  document.getElementById(px+"_prev").innerHTML=h;
}
function saveNew(){

function _cent(n){ if(n===0)return "";if(n===100)return "cem";
  var c=["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"],d=["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"],u=["","um","dois","três","quatro","cinco","seis","sete","oito","nove"],dz=["dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
  var o=[],h=Math.floor(n/100),r=n%100; if(h>0)o.push(c[h]);
  if(r>0){ if(r<10)o.push(u[r]); else if(r<20)o.push(dz[r-10]); else { var dd=Math.floor(r/10),uu=r%10; o.push(uu===0?d[dd]:d[dd]+" e "+u[uu]); } } return o.join(" e "); }
function extInt(v){ v=Math.floor(Math.abs(v)); if(v===0)return "zero"; var s=String(v); while(s.length%3!==0)s="0"+s; var n=s.length/3,e2=[["",""],["mil","mil"],["milhão","milhões"],["bilhão","bilhões"]],res="";
  for(var i=0;i<n;i++){ var g=parseInt(s.substr(i*3,3),10); if(g===0)continue; var e=n-1-i,txt=_cent(g); if(e===1)txt=(g===1?"mil":txt+" mil"); else if(e>=2)txt=txt+" "+(g===1?e2[e][0]:e2[e][1]); if(res==="")res=txt; else res+=((g<100||g%100===0)?" e ":", ")+txt; } return res; }
function extReais(v){ v=Math.round((v||0)*100)/100; var r=Math.floor(v),c=Math.round((v-r)*100),p=[]; if(r>0)p.push(extInt(r)+(r===1?" real":" reais")); if(c>0)p.push(extInt(c)+(c===1?" centavo":" centavos")); if(p.length===0)return "zero reais"; return p.join(" e "); }

function _sha256(ascii){

  for(var i=0;i<ascii.length;i++){ var j=ascii.charCodeAt(i); if(j>>8) return ""; words[i>>2]|=j<<((3-i)%4)*8; }
  words[words.length]=((asciiBitLength/maxWord)|0); words[words.length]=(asciiBitLength);

    var w=words.slice(j,j+=16), oldHash=hash; hash=hash.slice(0,8);
    for(var i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2], a=hash[0], e=hash[4];

      var temp2=(rr(2,a)^rr(13,a)^rr(22,a))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
