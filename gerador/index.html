<style>
  html,body{margin:0;padding:0;height:100%}
  body{font-family:"Segoe UI",Arial,sans-serif;background:#f1f2f5;color:#1f2733;font-size:13px}
  button{font-family:inherit;cursor:pointer}
  .top{background:#000;color:#e6c15a;padding:10px 16px;overflow:hidden;border-bottom:2px solid #b8942f}
  .top .t{font-size:16px;font-weight:bold;float:left;color:#e6c15a}
  .top .t small{display:block;font-size:11px;color:#c9ab5e;font-weight:normal}
  .top .acts{float:right}
  .top .acts button{border:1px solid #8a6d1f;background:#1a1710;color:#e6c15a;padding:6px 10px;border-radius:5px;font-size:12px;font-weight:bold;margin-left:6px}
  .wrap{padding:16px 20px 40px;max-width:920px;margin:0 auto}
  h2{color:#1f2733;font-size:18px;margin:6px 0 2px}
  .sub{color:#7b8494;font-size:12px;margin-bottom:14px}
  .doc{display:inline-block;vertical-align:top;width:250px;background:#fff;border:1px solid #e4d9b3;border-radius:8px;padding:14px;margin:0 10px 12px 0;box-shadow:0 1px 2px rgba(30,40,60,.08);cursor:pointer}
  .doc:hover{border-color:#d4af37;box-shadow:0 2px 8px rgba(180,148,47,.25)}
  .doc .dt{font-weight:bold;color:#1f2733;font-size:14px}
  .doc .dd{color:#7b8494;font-size:11px;margin-top:4px}
  .big{width:270px;padding:22px}
  .big .dt{font-size:16px}
  .fg{overflow:hidden;margin:0 -6px}
  .fld{float:left;width:50%;box-sizing:border-box;padding:6px}
  .fld.full{width:100%}
  .fld.t3{width:33.33%}
  .fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#8a7a4e;font-weight:bold;margin-bottom:3px}
  .fld input,.fld select,.fld textarea{width:100%;box-sizing:border-box;padding:7px 8px;border:1px solid #cfd6e0;border-radius:5px;font-size:13px;font-family:inherit}
  .fld input:focus,.fld textarea:focus,.fld select:focus{border-color:#d4af37;outline:none}
  .fld textarea{min-height:66px;resize:vertical}
  .sec{background:#fff;border:1px solid #e4d9b3;border-radius:8px;padding:12px 14px;margin-bottom:14px}
  .sec h3{margin:0 0 8px;font-size:13px;color:#8a6d1f;text-transform:uppercase;letter-spacing:.5px}
  .bar{margin-top:10px}
  .btn{border:1px solid #8a6d1f;background:#1a1710;color:#e6c15a;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:bold;margin-right:8px}
  .btn.primary{background:#d4af37;color:#111;border-color:#d4af37}
  .btn.ghost{background:#fff;color:#5b6472;border-color:#cfd6e0}
  .rascunho{background:#fff;border:1px solid #e4d9b3;border-radius:8px;padding:16px 18px;line-height:1.55;color:#222}
  .rascunho .nm{font-weight:bold}
  .warn{background:#fff6e5;border:1px solid #e8c46a;color:#8a5a00;padding:9px 12px;border-radius:6px;margin-bottom:12px;font-size:12px}
  .err{background:#ffe9e6;border:1px solid #e79b90;color:#a33;padding:9px 12px;border-radius:6px;margin-bottom:12px;font-size:12px}
  .ok{background:#e9f7ec;border:1px solid #8ccfa0;color:#1d6b38;padding:12px 14px;border-radius:6px;margin-bottom:12px}
  .hint{color:#7b8494;font-size:11px;margin-top:4px}
  ul.rem{margin:6px 0 0 18px;padding:0}
  ul.rem li{margin:3px 0;font-size:12px;color:#555}
  .search{width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #cfd6e0;border-radius:6px;font-size:14px;margin-bottom:10px}
  table.cli{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e4d9b3;border-radius:8px;overflow:hidden}
  table.cli th{background:#faf7ee;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;color:#8a7a4e;border-bottom:1px solid #e4d9b3}
  table.cli td{padding:8px 10px;border-bottom:1px solid #eee;font-size:13px}
  table.cli tr{cursor:pointer}
  table.cli tr:hover td{background:#fdfbf3}
  .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:#eee;color:#666;margin-left:6px}
  html{-webkit-text-size-adjust:100%}
  body{font-size:14px}
  .wrap{padding:10px}
  .fld input,.fld select,.fld textarea{font-size:16px;padding:9px}
  button,.btn{min-height:36px}
  table{font-size:12px}
  th,td{padding:6px;white-space:nowrap}
  .doc.big{min-width:90%}
</style>
</head>

/* ====== CEP (ViaCEP / Correios) ====== */
function buscarCEP(px){
  var cep=val(px+"_cep").replace(/\D/g,""); if(cep.length!==8) return;
  try{
    var xhr=new XMLHttpRequest();
    xhr.open("GET","https://viacep.com.br/ws/"+cep+"/json/",false); xhr.send();
    if(xhr.status===200){
      var o=JSON.parse(xhr.responseText);
      if(!o.erro){
        if(o.logradouro&&$(px+"_log")&&!val(px+"_log")) $(px+"_log").value=o.logradouro;
        if(o.bairro&&$(px+"_bairro")&&!val(px+"_bairro")) $(px+"_bairro").value=o.bairro;
        if(o.localidade&&$(px+"_cidade")) $(px+"_cidade").value=o.localidade;
        if(o.uf&&$(px+"_uf")) $(px+"_uf").value=o.uf;
      }
    }
  }catch(e){}
}

function getQualifData(){
  var o={}; o.tipo=val("q_tipo")||"PF";
  if(o.tipo==="PJ"){
    o.razao=val("pj_razao"); o.cnpj=val("pj_cnpj"); o.rep=val("pj_rep"); o.repcpf=val("pj_repcpf");
    o.log=val("pj_log"); o.num=val("pj_num"); o.bairro=val("pj_bairro"); o.cidade=val("pj_cidade"); o.uf=val("pj_uf"); o.cep=val("pj_cep");
    o.nome=o.razao; o.cpf=o.cnpj;
  } else {
    o.nome=val("q_nome"); o.sexo=val("q_sexo")||"F"; o.nac=val("q_nac"); o.estciv=val("q_estciv"); o.prof=val("q_prof");
    o.rg=val("q_rg"); o.orgao=val("q_orgao"); o.cpf=val("q_cpf");
    o.log=val("q_log"); o.num=val("q_num"); o.bairro=val("q_bairro"); o.cidade=val("q_cidade"); o.uf=val("q_uf"); o.cep=val("q_cep");
  }
  o.tel=val("q_tel"); o.email=val("q_email"); o.obs=val("q_obs"); o.advogado=val("q_adv")||"Leonardo"; o.area=val("q_area");
  o.qualif=buildQualifStr(o);
  return o;
}
function buildQualifStr(o){
  if(o.tipo==="PJ"){
    var s=", pessoa jurídica de direito privado, inscrita no CNPJ/MF sob o nº "+o.cnpj+", com sede na "+o.log+", nº "+o.num+", "+o.bairro+", CEP "+o.cep+", "+o.cidade+"/"+o.uf+", neste ato representada por "+o.rep;
    if(o.repcpf) s+=" (CPF nº "+o.repcpf+")";
    return s;
  }
  var a=(o.sexo==="M")?"o":"a";
  var nac=o.nac||((o.sexo==="M")?"brasileiro":"brasileira");
  var s=", "+nac+", "+o.estciv+", "+o.prof+", ";
  if(o.rg) s+="portador"+a+" do RG nº "+o.rg+(o.orgao?" "+o.orgao:"")+", ";
  s+="inscrit"+a+" no CPF/MF sob o nº "+o.cpf+", residente e domiciliad"+a+" na "+o.log+", nº "+o.num+", "+o.bairro+", CEP "+o.cep+", "+o.cidade+"/"+o.uf;
  return s;
}
/* acrescenta telefone e e-mail à qualificação, quando informados */
function contatoStr(o){
  var s="";
  if(o && o.tel) s+=", telefone "+o.tel;
  if(o && o.email) s+=", e-mail "+o.email;
  return s;
}
/* insere o contato ANTES do endereço (antes de "residente e domiciliad...") */
function inserirContato(qualif, o){
  var c=contatoStr(o); if(!c) return qualif;
  if(/,\s*residente e domiciliad/i.test(qualif)){ return qualif.replace(/,\s*residente e domiciliad/i, function(m){ return c+m; }); }
  return qualif+c;
}
/* qualificação SEM o endereço (para a Declaração de Endereço) */
function qualifSemEnd(o){
  if(o.estciv){
    var a=(o.sexo==="M")?"o":"a"; var nac=o.nac||((o.sexo==="M")?"brasileiro":"brasileira");
    var s=", "+nac+", "+o.estciv+", "+o.prof+", ";
    if(o.rg) s+="portador"+a+" do RG nº "+o.rg+(o.orgao?" "+o.orgao:"")+", ";
    s+="inscrit"+a+" no CPF/MF sob o nº "+o.cpf;
    return s;
  }
  var q=o.qualif||""; return q.split(/,\s*residente/i)[0];
}
/* endereço de residência formatado */
function enderecoDe(o){
  if(o.log) return o.log+", "+o.num+", "+o.bairro+", na Cidade de "+o.cidade+"/"+o.uf;
  var q=o.qualif||""; var m=q.match(/residente e domiciliad[oa] n[ao]\s+(.+)$/i);
  if(m){ return m[1].replace(/,?\s*CEP\s*[\d\-\.]+\s*/i,", ").replace(/\s+/g," "); }
  return "";
}

function preencherQualif(c){
  if($("q_tipo")){ $("q_tipo").value=c.tipo||"PF"; togglePessoa(); }
  var map=["nome","sexo","nac","estciv","prof","rg","orgao","cpf","log","num","bairro","cidade","uf","cep","tel","email","obs"];
  for(var i=0;i<map.length;i++){ if($("q_"+map[i])&&c[map[i]]!=null) $("q_"+map[i]).value=c[map[i]]; }
  if($("q_adv")&&c.advogado) $("q_adv").value=c.advogado;
  if($("q_area")&&c.area!=null) $("q_area").value=c.area;
  if(c.tipo==="PJ"){ var pm=["razao","cnpj","rep","repcpf","log","num","bairro","cidade","uf","cep"]; for(var j=0;j<pm.length;j++){ if($("pj_"+pm[j])&&c[pm[j]]!=null) $("pj_"+pm[j]).value=c[pm[j]]; } }

function salvarCliente(id){
  var miss=faltandoQualif();
  if(miss.length){ $("msg").innerHTML='<div class="err"><b>Faltam dados:</b> '+esc(miss.join(", "))+'.</div>'; window.scrollTo(0,0); return; }
  var o=getQualifData();
  if(id){ var c=findCliente(id); if(c){ for(var k in o){ if(o.hasOwnProperty(k)) c[k]=o[k]; } } }
  else {
    var dupes=clientesComNome(o.nome);
    if(dupes.length){
      var lst=""; for(var k=0;k<dupes.length && k<6;k++){ lst+="\n  • "+dupes[k].nome+(dupes[k].origem?"  ("+dupes[k].origem+")":""); }
      if(dupes.length>6) lst+="\n  • ... e mais "+(dupes.length-6);
      if(!confirm("⚠ ATENÇÃO: já existe cliente cadastrado com esse nome:"+lst+"\n\nCadastrar assim mesmo (novo cadastro separado)?")) return;
    }
    o.id=nextId(); o.origem="cadastro"; CLIENTES.push(o); id=o.id;
  }
  if(saveClientes()) irCliente(id);
}

    fld("Valor TOTAL (R$) *","p_total","5.000,00")+
    fld("Nº de parcelas *","p_nparc","5")+
    fld("Valor da parcela (R$) *","p_vparc","1.000,00")+
    fld("Data do 1º vencimento *","p_data","dd/mm/aaaa")+
  '</div><div class="hint">O valor por extenso é gerado automaticamente. A aritmética (nº × parcela = total) é conferida no rascunho.</div></div>';
}
function irForm(k){
  DOCKEY=k;var d=DOCS[k];
  if(CLIENTE && !CLIENTE.qualif){
    $("app").innerHTML='<h2>Complete o cadastro</h2><div class="warn">Este cliente foi importado das pastas do escritório apenas com o <b>nome</b>. Para gerar documentos, complete a qualificação (CPF, endereço, etc.) uma vez — depois fica salvo.</div><div class="bar"><button class="btn primary" onclick="irCadastro('+CLIENTE.id+')">Completar cadastro</button> <button class="btn ghost" onclick="irCliente('+CLIENTE.id+')">Voltar</button></div>';
    return;
  }
  var h='<h2>'+esc(d.t)+'</h2><div class="sub">'+(CLIENTE?('Cliente: <b>'+esc(CLIENTE.nome)+'</b>. '):'')+'Campos com * são obrigatórios.</div><div id="msg"></div>';
  if(!CLIENTE) h+='<div class="sec"><h3>Puxar cliente do banco (opcional)</h3><div class="hint" style="margin-bottom:6px">Busque um cliente já cadastrado para preencher os campos automaticamente.</div><input class="search" id="av_busca" placeholder="Buscar por nome ou CPF/CNPJ..." onkeyup="buscarAvulso()"><div id="av_res"></div></div>';
  if(d.qualif && !CLIENTE) h+=blocoQualif();
  var ex=d.extra||[];var specHtml="";
  if(!d.qualif){
    specHtml+='<div class="sec"><h3>Dados</h3><div class="fg">';
    if(!CLIENTE){ specHtml+=fld("Nome completo do cliente *","q_nome","","full")+fld("CPF / CNPJ *","q_cpf","000.000.000-00"); }
    if(has(ex,"recibo")) specHtml+=fld("Valor recebido (R$) *","r_valor","730,00")+'<div class="fld"><label>Advogado que recebe *</label><select id="r_adv"><option value="Leonardo">Leonardo Brais da Silva — OAB/PR 90.076</option><option value="João Marcos">João Marcos Brais — OAB/PR 49.462</option></select></div>';
    if(has(ex,"retirada")) specHtml+=fld("Documentos retirados (um por linha) *","d_docs","Ex.:\nCarta de anuência\nRG original\nComprovante de residência","full","textarea");
    specHtml+='</div></div>';
  }
  if(has(ex,"finalidade")) specHtml+='<div class="sec"><h3>Finalidade do contrato</h3><div class="fg">'+fld("Finalidade (depois de “especialmente para…”) *","c_fin","propor ação de indenização","full")+'</div></div>';
  if(has(ex,"pctprov")||has(ex,"pct2")){
    specHtml+='<div class="sec"><h3>Honorários (percentual)</h3><div class="fg">';
    specHtml+=fld("% sobre o proveito econômico *","c_pct","30");
    if(has(ex,"pct2")) specHtml+=fld("% sobre os atrasados *","c_pct2","30");
    specHtml+='</div></div>';
  }
  if(has(ex,"parcelamento")) specHtml+=blocoParcelamento();
  if(d.endereco) specHtml+=blocoTitular();
  h+=specHtml;
  var voltar = CLIENTE ? ('irCliente('+CLIENTE.id+')') : 'irAvulsos()';
  h+='<div class="bar"><button class="btn primary" onclick="rascunho()">Ver rascunho</button> <button class="btn ghost" onclick="'+voltar+'">Voltar</button></div>';
  $("app").innerHTML=h;
  if((d.qualif && !CLIENTE) || d.endereco) aplicarDefaults();
}

/* ====== validação ====== */
function faltandoQualif(){
  var miss=[]; function need(id,rot){ if(!val(id)) miss.push(rot); }
  if(val("q_tipo")==="PJ"){ need("pj_razao","Razão social");need("pj_cnpj","CNPJ");need("pj_rep","Representante legal");need("pj_log","Logradouro");need("pj_num","Número");need("pj_bairro","Bairro");need("pj_cep","CEP");need("pj_cidade","Cidade");need("pj_uf","UF"); }
  else { need("q_nome","Nome");need("q_estciv","Estado civil");need("q_prof","Profissão");need("q_cpf","CPF");need("q_log","Logradouro");need("q_num","Número");need("q_bairro","Bairro");need("q_cep","CEP");need("q_cidade","Cidade");need("q_uf","UF"); }
  return miss;
}
function faltando(){
  var d=DOCS[DOCKEY];var miss=[];function need(id,rot){ if(!val(id)) miss.push(rot); }
  if(!CLIENTE){
    if(d.qualif){ miss=miss.concat(faltandoQualif()); }
    else { need("q_nome","Nome");need("q_cpf","CPF / CNPJ"); }
  }
  var ex=d.extra||[];
  if(has(ex,"recibo")){ need("r_valor","Valor"); }
  if(has(ex,"retirada")){ need("d_docs","Documentos"); }
  if(has(ex,"finalidade")){ need("c_fin","Finalidade"); }
  if(has(ex,"pctprov")||has(ex,"pct2")){ need("c_pct","Percentual"); }
  if(has(ex,"pct2")){ need("c_pct2","% atrasados"); }
  if(has(ex,"parcelamento")){ need("p_total","Valor total");need("p_nparc","Nº parcelas");need("p_vparc","Valor parcela");need("p_data","1º vencimento"); }
  if(d.endereco){ need("t_nome","Titular: nome");need("t_estciv","Titular: estado civil");need("t_prof","Titular: profissão");need("t_cpf","Titular: CPF");need("t_log","Titular: logradouro");need("t_num","Titular: número");need("t_bairro","Titular: bairro");need("t_cep","Titular: CEP");need("t_cidade","Titular: cidade");need("t_uf","Titular: UF"); }
  return miss;
}
function montarValores(){
  var d=DOCS[DOCKEY];var v={};
  if(DOCKEY==="endereco"){
    var a2 = CLIENTE ? CLIENTE : getQualifData();
    v["{{NOME}}"]=(a2.nome||"").toUpperCase();
    v["{{QUALIF_SEND}}"]=qualifSemEnd(a2)+contatoStr(a2);
    v["{{ENDERECO}}"]=enderecoDe(a2);
    var tit=getTitular();
    v["{{NOME_TIT}}"]=(tit.nome||"").toUpperCase();
    v["{{QUALIF_TIT}}"]=tit.qualif;
    return v;
  }
  var src = CLIENTE ? CLIENTE : getQualifData();
  v["{{NOME}}"]=(src.nome||"").toUpperCase();
  if(d.qualif) v["{{QUALIFICACAO}}"]=inserirContato(src.qualif||"", src);
  var ex=d.extra||[];
  if(!d.qualif) v["{{CPF}}"]=src.cpf||"";
  if(has(ex,"recibo")){ v["{{CPF}}"]=src.cpf||""; var rv=parseNum(val("r_valor")); v["{{VALOR}}"]="R$ "+formatBR(rv)+" ("+extensoReais(rv)+")"; if(val("r_adv")==="João Marcos"){ v["{{ADVOGADO}}"]="JOÃO MARCOS BRAIS"; v["{{OAB}}"]="49.462"; } else { v["{{ADVOGADO}}"]="LEONARDO BRAIS DA SILVA"; v["{{OAB}}"]="90.076"; } }
  if(has(ex,"retirada")){
    v["{{CPF}}"]=src.cpf||"";
    var linhas=val("d_docs").split(/\r?\n/);var out=[];
    for(var i=0;i<linhas.length;i++){var t=linhas[i].replace(/^\s+|\s+$/g,"").replace(/[;.]+$/,"");if(t)out.push(t);}
    v["{{DOCUMENTOS}}"]=out.join("; ")+".";
  }
  if(has(ex,"finalidade")) v["{{FINALIDADE}}"]="especialmente para "+val("c_fin");
  if(DOCKEY==="c_proveito") v["{{PERCENTUAL}}"]=val("c_pct")+"% DO PROVEITO ECONÔMICO";
  if(DOCKEY==="c_parcprov") v["{{PERCENTUAL}}"]=val("c_pct")+"%";
  if(DOCKEY==="c_inss"){ v["{{PERCENTUAL1}}"]=val("c_pct")+"%"; v["{{PERCENTUAL2}}"]=val("c_pct2")+"%"; }
  if(has(ex,"parcelamento")){
    var tot=parseNum(val("p_total")), vp=parseNum(val("p_vparc")), np=parseInt(val("p_nparc"),10);
    v["{{PARCELAMENTO}}"]="R$ "+formatBR(tot)+" ("+extensoReais(tot)+") que serão pagos em "+np+" ("+extensoInt(np)+") parcelas de R$ "+formatBR(vp)+" ("+extensoReais(vp)+"), com o primeiro vencimento no dia "+val("p_data")+" e no mesmo dia dos meses subsequentes";
  }
  return v;
}

/* ====== rascunho ====== */
function rascunho(){
  var miss=faltando();
  if(miss.length){ $("msg").innerHTML='<div class="err"><b>Faltam dados (Regra 3):</b> '+esc(miss.join(", "))+'. Não é possível gerar sem essas informações.</div>'; window.scrollTo(0,0); return; }
  var d=DOCS[DOCKEY];var v=montarValores();
  var warnHtml="";
  if(has(d.extra||[],"parcelamento")){
    var n=parseInt(val("p_nparc"),10),vp=parseNum(val("p_vparc")),tt=parseNum(val("p_total"));
    if(!isNaN(n)&&!isNaN(vp)&&!isNaN(tt)){ var calc=Math.round(n*vp*100)/100; if(Math.abs(calc-tt)>=0.01){ warnHtml='<div class="warn">⚠ Aritmética do parcelamento não fecha: '+n+' × R$ '+formatBR(vp)+' = R$ '+formatBR(calc)+', mas o total é R$ '+formatBR(tt)+'. Confira antes de gerar.</div>'; } }
  }
  var r='<h2>Rascunho — '+esc(d.t)+'</h2><div class="sub">Confira tudo antes de gerar. (Regra 1: nada é gerado sem sua confirmação.)</div>'+warnHtml+'<div class="rascunho">';
  if(v["{{QUALIF_SEND}}"]!=null){
    r+='<div><span class="nm">'+esc(v["{{NOME}}"])+'</span>'+esc(v["{{QUALIF_SEND}}"])+' — reside na '+esc(v["{{ENDERECO}}"])+'</div>';
    r+='<div style="margin-top:8px"><b>Titular:</b> <span class="nm">'+esc(v["{{NOME_TIT}}"])+'</span>'+esc(v["{{QUALIF_TIT}}"])+'</div>';
  } else {
    r+='<div><span class="nm">'+esc(v["{{NOME}}"])+'</span>'+(v["{{QUALIFICACAO}}"]?esc(v["{{QUALIFICACAO}}"]):"")+'</div>';
  }
  if(v["{{CPF}}"]&&!d.qualif) r+='<div style="margin-top:8px">CPF/CNPJ: '+esc(v["{{CPF}}"])+'</div>';
  if(v["{{VALOR}}"]) r+='<div style="margin-top:8px">Valor: '+esc(v["{{VALOR}}"])+'</div>';
  if(v["{{ADVOGADO}}"]) r+='<div style="margin-top:8px">Recebe: <b>'+esc(v["{{ADVOGADO}}"])+'</b> — OAB/PR '+esc(v["{{OAB}}"])+'</div>';
  if(v["{{DOCUMENTOS}}"]) r+='<div style="margin-top:8px">Documentos: '+esc(v["{{DOCUMENTOS}}"])+'</div>';
  if(v["{{FINALIDADE}}"]) r+='<div style="margin-top:8px">Finalidade: <b>'+esc(v["{{FINALIDADE}}"])+'</b></div>';
  if(v["{{PERCENTUAL}}"]) r+='<div style="margin-top:8px">Honorários: <b>'+esc(v["{{PERCENTUAL}}"])+'</b></div>';
  if(v["{{PERCENTUAL1}}"]) r+='<div style="margin-top:8px">Honorários: <b>'+esc(v["{{PERCENTUAL1}}"])+'</b> (proveito) · <b>'+esc(v["{{PERCENTUAL2}}"])+'</b> (atrasados)</div>';
  if(v["{{PARCELAMENTO}}"]) r+='<div style="margin-top:8px">Parcelamento: <b>'+esc(v["{{PARCELAMENTO}}"])+'</b></div>';
  r+='<div style="margin-top:10px;color:#7b8494;font-size:11px">Data no documento: hoje ('+dataHojeBR()+'). Assinatura e advogados do modelo são mantidos.</div></div>';
  var destInfo = destinoCliente() ? ('<div class="hint" style="margin-bottom:8px">📁 Será salvo na pasta do cliente: '+esc(destinoCliente())+'</div>') : (CLIENTE?'<div class="hint" style="margin-bottom:8px">Defina <b>advogado</b> e <b>área</b> no cadastro do cliente para salvar na pasta dele. Por enquanto vai para "Documentos Gerados".</div>':'');
  r+='<div class="bar">'+destInfo+'<button class="btn primary" onclick="gerar(\'word\')">Gerar Word</button> <button class="btn primary" onclick="gerar(\'pdf\')">Gerar PDF</button> <button class="btn ghost" onclick="irForm(\''+DOCKEY+'\')">Voltar</button></div>';
  window._VALS=v;
  $("app").innerHTML=r;window.scrollTo(0,0);
}

/* ====== gerar ====== */
function nomeSaida(){
  var d=DOCS[DOCKEY];var nome=window._VALS["{{NOME}}"]||"cliente";
  var base=d.t.replace(/[—:].*$/,"").replace(/[^\wçãõáéíóúâêôà ]/gi,"").replace(/\s+/g," ").replace(/^\s+|\s+$/g,"");
  return base+" - "+nome;
}
function destinoCliente(){
  if(!CLIENTE || !CLIENTE.advogado || !CLIENTE.area) return null;
  var jur=folderOf().replace(/Gerador de Documentos\\?$/i,"");
  var areaFolder=CLIENTE.area;
  if(CLIENTE.advogado==="Leonardo" && CLIENTE.area==="Cível") areaFolder="Dir. Cível";
  else if(CLIENTE.area==="Dativo") areaFolder="Defensor Dativo";
  return jur+"CLIENTES\\"+CLIENTE.advogado+"\\"+areaFolder+"\\"+CLIENTE.nome+"\\";
}

function abrirPasta(){ }

if(!PC.auth||!PC.host){ showLoginPC(""); }
else baixarBanco(function(){ irHome(); });
