<style>
html,body{margin:0;height:100%;background:#0d0d0d;color:#e6c15a;font-family:'Segoe UI',Arial,sans-serif}

<div id="ld"><div class="sp"></div><div id="msg">Carregando Entradas e Saídas…</div></div>
<script>
(function(){
  var BK="https://square-pine-09cb.braisesilva.workers.dev";
  var S="13380daadd106051628b87131d192bdc05561bd9ddec1401";
  var CODEKEY="code_financeiro";
  var CACHE="brsv_"+CODEKEY;
  function run(html){
    try{ document.open(); document.write(html); document.close(); }catch(e){ fail(e.message); return; }
    setTimeout(function(){ try{ var f=window.onload; if(typeof f==="function"){ window.onload=null; f(); } }catch(e){} },0);
  }
  function cache(){ try{ return localStorage.getItem(CACHE); }catch(e){ return null; } }
  function fail(m){ var el=document.getElementById("msg"); if(el){ el.innerHTML="Sem conexão com o servidor e sem cópia salva neste aparelho.<br><small style=\"color:#8a6d1f\">"+(m||"")+"</small>"; var b=document.createElement("button"); b.innerHTML="Tentar de novo"; b.onclick=function(){ location.reload(); }; el.parentNode.appendChild(b); } }
  var x=new XMLHttpRequest();
  x.open("GET", BK+"?k="+CODEKEY+"&s="+S+"&_="+(new Date().getTime()), true);
  x.onreadystatechange=function(){
    if(x.readyState!==4) return;
    if(x.status===200 && x.responseText && x.responseText.length>800){
      try{ localStorage.setItem(CACHE, x.responseText); }catch(e){}
      run(x.responseText);
    }else{
      var c=cache(); if(c) run(c); else fail("resposta "+x.status);
    }
  };
  x.onerror=function(){ var c=cache(); if(c) run(c); else fail("sem conexao"); };
  x.send();
})();
</script>
