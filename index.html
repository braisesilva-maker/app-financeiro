<style>
  html,body{margin:0;padding:0;height:100%}
  body{font-family:"Segoe UI",Arial,sans-serif;background:#f1f2f5;color:#1f2733;font-size:13px}
  button{font-family:inherit;cursor:pointer}
  a{color:#8a6d1f}
  .top{background:#000;color:#e6c15a;padding:10px 16px;overflow:hidden;border-bottom:2px solid #b8942f}
  .top .t{font-size:16px;font-weight:bold;float:left;color:#e6c15a}
  .top .t small{display:block;font-size:11px;color:#c9ab5e;font-weight:normal}
  .top .acts{float:right}
  .top .acts button{border:1px solid #8a6d1f;background:#1a1710;color:#e6c15a;padding:6px 10px;border-radius:5px;font-size:12px;font-weight:bold;margin-left:6px}
  .top .acts button.primary{background:#d4af37;color:#111;border-color:#d4af37}
  .save{float:right;color:#cbb26a;font-size:11px;margin:7px 12px 0 0}
  .save.err{color:#ffd0cb}
  .top{height:40px}
  .wrap{position:absolute;top:64px;bottom:0;left:0;right:0;overflow:auto;padding:12px 16px 30px;box-sizing:border-box}
  .cards{white-space:nowrap;margin-bottom:12px}
  .card{display:inline-block;vertical-align:top;background:#fff;border:1px solid #e4d9b3;border-radius:8px;padding:10px 14px;margin:0 8px 8px 0;width:180px;box-shadow:0 1px 2px rgba(30,40,60,.08)}
  .card .l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#8a7a4e;font-weight:bold}
  .card .v{font-size:19px;font-weight:bold;margin-top:4px;color:#1f2733}
  .card .s{font-size:11px;color:#7b8494;margin-top:2px}
  .money{color:#0d7d5a}
  .v.warn{color:#b5820a} .v.bad{color:#c0392b}
  .bar{margin-bottom:10px;overflow:hidden}
  .tab{border:1px solid #dcd2a6;background:#fff;padding:7px 14px;border-radius:16px;font-weight:bold;color:#8a7a4e;margin-right:6px;float:left}
  .tab.on{background:#d4af37;color:#1a1a1a;border-color:#d4af37}
  .filters{float:right}
  .filters input,.filters select{border:1px solid #d0c9b0;background:#fff;color:#1f2733;border-radius:6px;padding:6px 8px;font-size:12px;margin-left:6px}
  .filters input{width:170px}
  .mesnav{margin-bottom:10px}
  .mesnav button{border:1px solid #dcd2a6;background:#fff;color:#8a6d1f;border-radius:6px;padding:6px 12px;font-weight:bold;font-size:14px}
  .mesnav select{border:1px solid #d0c9b0;background:#fff;border-radius:6px;padding:6px 8px;font-size:13px;font-weight:bold;color:#1f2733;margin:0 3px}
  .sec{background:#fff;border:1px solid #e6dcb8;border-radius:8px;margin-bottom:14px;overflow:hidden}
  .sec h3{margin:0;padding:9px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:#8a6d1f;border-bottom:1px solid #efe8d0;background:#faf7ec}
  .sec h3 .c{background:#f0ead2;color:#8a7a4e;border-radius:12px;padding:1px 8px;font-size:11px;margin-left:6px}
  .sec h3 .add{float:right;border:1px solid #d0c8a8;background:#fff;color:#6b5518;border-radius:5px;padding:1px 9px;font-size:11px;font-weight:bold}
  .scroll{max-height:340px;overflow:auto}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:6px 12px;border-bottom:1px solid #eef1f4}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:#8a7a4e;background:#faf7ec}
  td.r,th.r{text-align:right}
  tbody tr.tap{cursor:pointer}
  tbody tr.tap:hover{background:#faf6e8}
  tr.tot td{font-weight:bold;background:#faf7ec;border-top:2px solid #e6dcb8}
  .nome{font-weight:bold;color:#1f2733}
  .sub{font-size:11px;color:#8a94a3}
  .pill{display:inline-block;font-size:10px;font-weight:bold;padding:1px 7px;border-radius:12px}
  .pill.ent{background:#e6f5ee;color:#0d6b47}
  .pill.esc{background:#f3ecd3;color:#8a6d1f}
  .pill.soc{background:#e8eefb;color:#2c4f9e}
  .pill.rec{background:#e6f5ee;color:#0d6b47}
  .pill.jd{background:#eee;color:#666}
  .pill.leo{background:#e6f5ee;color:#0d6b47}
  .pill.jm{background:#e8eefb;color:#2c4f9e}
  .pill.cezar{background:#fdeeda;color:#a05c0a}
  .pill.semp{background:#fdeaea;color:#a02617}
  .empty{padding:22px;text-align:center;color:#8a94a3}
  .cols{overflow:hidden}
  .col2{float:left;width:49%;} .col2.rr{float:right}
  .acerto{padding:12px 14px}
  .acerto .ln{padding:6px 10px;border-radius:6px;background:#faf7ec;border:1px solid #ece3c6;margin-bottom:6px;font-weight:bold}
  .acerto .ln .val{float:right;color:#8a2f0a}
  .acerto .ok{background:#e6f5ee;border-color:#bfe4d2;color:#0d6b47}
  .acerto .warn2{background:#fdeaea;border-color:#f2c9c2;color:#a02617}
  .acerto .det{font-size:11px;color:#8a94a3;font-weight:normal;margin:2px 0 8px 2px}
  .ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,25,40,.5);z-index:50}
  .ov.on{display:block}
  .modal{background:#fff;border:1px solid #e6dcb8;border-radius:10px;width:640px;max-width:94%;margin:26px auto;box-shadow:0 18px 50px rgba(0,0,0,.35)}
  .mh{padding:14px 18px;border-bottom:1px solid #ece3c6;overflow:hidden}
  .mh .x{float:right;border:none;background:#f2eee0;border-radius:6px;width:30px;height:30px;font-size:17px;color:#8a7a4e}
  .mh h2{margin:0;font-size:18px;color:#1f2733}
  .mb{padding:14px 18px;max-height:64vh;overflow:auto}
  .mf{padding:12px 18px;border-top:1px solid #ece3c6;text-align:right;overflow:hidden}
  .btn2{border:1px solid #cdc7b0;background:#fff;color:#1f2733;padding:8px 15px;border-radius:7px;font-weight:bold;margin-left:6px}
  .btn2.go{background:#d4af37;color:#111;border-color:#d4af37}
  .btn2.del{color:#c0392b;border-color:#eec4be;float:left;margin-left:0}
  .fg{overflow:hidden}
  .fld{float:left;width:48%;margin:0 4% 10px 0;box-sizing:border-box}
  .fld.r2{margin-right:0}
  .fld.full{width:100%;margin-right:0}
  .fld.q3{width:30%;margin-right:3%}
  .fld label{display:block;font-size:11px;font-weight:bold;color:#8a7a4e;margin-bottom:3px}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid #d0c9b0;background:#fff;color:#1f2733;border-radius:6px;padding:7px 8px;font-size:13px;box-sizing:border-box}
  .hint{font-size:11px;color:#8a94a3;margin-top:3px}
  .sug{position:relative}
  .sugbox{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #d0c9b0;border-radius:0 0 6px 6px;max-height:150px;overflow:auto;z-index:60}
  .sugbox div{padding:5px 9px;cursor:pointer}
  .sugbox div:hover{background:#faf6e8}

<script language="javascript">
/* ===================== DADOS ===================== */
var EMBEDDED = /*__DATA__*/{"config":{"escLEO":25,"escJM":25,"escCEZAR":50,"socLEO":50,"socJM":50,"repassePadrao":10},"clientes":[],"lanc":[]};

var ENVELOPE = null, KEY = null, ENCSALT = null;

function folderOf(){ return ""; }
/* ===================== PCLOUD (nuvem) ===================== */
var PASTA = "/CONTROLE CONTRATOS";
var ARQUIVO_NOME = "Entradas e Saídas_dados.json";
var PC = {
  host: localStorage.getItem("pc_host") || "",
  auth: localStorage.getItem("pc_auth") || "",
  fileid: parseInt(localStorage.getItem("pc_fileid") || "0", 10),
  folderid: parseInt(localStorage.getItem("pc_folderid") || "0", 10)
};
var OFFLINE = false, SAVING = false, PENDING = false;
function api(metodo, params, cb, errCb){
  var q = [], k;
  params.auth = PC.auth;
  for(k in params) q.push(k + "=" + encodeURIComponent(params[k]));
  var x = new XMLHttpRequest();
  x.open("GET", "https://" + PC.host + "/" + metodo + "?" + q.join("&"), true);
  x.onreadystatechange = function(){
    if(x.readyState !== 4) return;
    if(x.status !== 200){ errCb("HTTP " + x.status); return; }
    var o = null;
    try{ o = JSON.parse(x.responseText); }catch(e){ errCb("resposta inválida"); return; }
    if(o.result !== 0){
      if(o.result === 1000 || o.result === 2000 || o.result === 2094 || o.result === 2095){
        PC.auth = ""; localStorage.removeItem("pc_auth");
      }
      errCb("pCloud erro " + o.result + (o.error ? ": " + o.error : ""));
      return;
    }
    cb(o);
  };
  x.onerror = function(){ errCb("sem conexão"); };
  x.send();
}
function loginPC(user, pass, cb, errCb){
  function tenta(host, depois){
    var x = new XMLHttpRequest();
    x.open("GET", "https://" + host + "/userinfo?getauth=1&username=" + encodeURIComponent(user) + "&password=" + encodeURIComponent(pass), true);
    x.onreadystatechange = function(){
      if(x.readyState !== 4) return;
      var o = null;
      try{ o = JSON.parse(x.responseText); }catch(e){}
      if(o && o.result === 0 && o.auth){
        PC.host = host; PC.auth = o.auth;
        localStorage.setItem("pc_host", host);
        localStorage.setItem("pc_auth", o.auth);
        cb();
      }
      else if(depois) depois();
      else errCb(o && o.error ? o.error : "login falhou");
    };
    x.onerror = function(){ if(depois) depois(); else errCb("sem conexão"); };
    x.send();
  }
  tenta("api.pcloud.com", function(){ tenta("eapi.pcloud.com", null); });
}
function localizarArquivo(cb, errCb){
  api("stat", { path: PASTA + "/" + ARQUIVO_NOME }, function(o){
    PC.fileid = o.metadata.fileid;
    PC.folderid = o.metadata.parentfolderid;
    localStorage.setItem("pc_fileid", PC.fileid);
    localStorage.setItem("pc_folderid", PC.folderid);
    cb();
  }, errCb);
}
function utf16leParaString(buf){
  var u8 = new Uint8Array(buf), i = 0;
  if(u8.length >= 2 && u8[0] === 0xFF && u8[1] === 0xFE) i = 2;
  if(window.TextDecoder){
    try{ return new TextDecoder("utf-16le").decode(u8.subarray(i)); }catch(e){}
  }
  var out = [];
  for(; i + 1 < u8.length; i += 2) out.push(String.fromCharCode(u8[i] | (u8[i+1] << 8)));
  return out.join("");
}
function baixarEnvelope(cb, errCb){
  api("getfilelink", { fileid: PC.fileid, forcedownload: 1 }, function(o){
    var url = "https://" + o.hosts[0] + o.path;
    var x = new XMLHttpRequest();
    x.open("GET", url, true);
    x.responseType = "arraybuffer";
    x.onreadystatechange = function(){
      if(x.readyState !== 4) return;
      if(x.status !== 200){ errCb("download HTTP " + x.status); return; }
      try{
        var s = utf16leParaString(x.response);
        var env = JSON.parse(s);
        try{ localStorage.setItem("env_cache", s); }catch(eq){}
        cb(env);
      }catch(e){ errCb("arquivo inválido: " + e.message); }
    };
    x.onerror = function(){ errCb("sem conexão"); };
    x.send();
  }, errCb);
}
function uploadTexto(txt, cb){
  var n = txt.length, u8 = new Uint8Array(2 + n * 2), i, c;
  u8[0] = 0xFF; u8[1] = 0xFE;
  for(i = 0; i < n; i++){ c = txt.charCodeAt(i); u8[2 + i*2] = c & 255; u8[3 + i*2] = c >> 8; }
  var fd = new FormData();
  fd.append("file", new Blob([u8], { type: "application/octet-stream" }), ARQUIVO_NOME);
  var x = new XMLHttpRequest();
  x.open("POST", "https://" + PC.host + "/uploadfile?folderid=" + PC.folderid + "&nopartial=1&auth=" + encodeURIComponent(PC.auth), true);
  x.onreadystatechange = function(){
    if(x.readyState !== 4) return;
    var o = null;
    try{ o = JSON.parse(x.responseText); }catch(e){}
    cb(!!(o && o.result === 0 && x.status === 200));
  };
  x.onerror = function(){ cb(false); };
  x.send(fd);
}
function showLogin(msg){

}

  var u = document.getElementById("pc_user").value.replace(/^\s+|\s+$/g, "");

    localizarArquivo(function(){ iniciarComToken(); },
      function(e2){ err.innerHTML = "Conectei, mas não achei o arquivo em " + PASTA + ": " + esc(e2); });
  }, function(e1){ err.innerHTML = "Falha no login: " + esc(e1); });
}
function iniciarComToken(){
  document.getElementById("lockbox").innerHTML = '<h2>Entradas e Saídas</h2><div class="ls">Brais e Silva — Advocacia</div><div style="color:#c9ab5e;margin-top:14px">Baixando dados da nuvem…</div>';
  document.getElementById("lock").style.display = "";
  var go = function(){
    baixarEnvelope(function(env){ ENVELOPE = env; DB = null; OFFLINE = false; showLock(); },
      function(err){
        var s = null;
        try{ s = localStorage.getItem("env_cache"); }catch(e){}
        if(s){
          try{ ENVELOPE = JSON.parse(s); OFFLINE = true; showLock(); toast("Sem conexão — usando última cópia"); return; }catch(e2){}
        }
        showLogin("Não consegui acessar o pCloud: " + err);
      });
  };
  if(!PC.fileid) localizarArquivo(go, function(err){ showLogin("Erro ao localizar o arquivo: " + err); });
  else go();
}
function loadData(){ }
function save(silent){
  PENDING = true;
  var el = document.getElementById("saveInfo");
  el.className = "save"; el.innerHTML = "salvando na nuvem…";
  agendaPush();
}
function agendaPush(){
  if(SAVING || !PENDING) return;
  SAVING = true; PENDING = false;
  pushCloud(function(ok){
    SAVING = false;
    if(ok){ setSaved(true); OFFLINE = false; }
    else { setSaved(false); PENDING = true; setTimeout(agendaPush, 8000); }
    if(PENDING) agendaPush();
  });
}
function pushCloud(cb){
  if(!KEY){ cb(false); return; }
  baixarEnvelope(function(env){
    try{
      if(env && env.enc === "BRSV1"){
        if(env.salt !== ENCSALT){
          alert("A senha do app foi alterada em outro aparelho.\nEntre novamente com a senha nova.");
          ENVELOPE = env; DB = null; KEY = null; PENDING = false; showLock();
          cb(false); return;
        }
        var rem = decryptEnvelope(env, KEY);
        if(rem){ DB = mergeDB(DB, rem); normalize(); }
      }
      var txt = JSON.stringify(encryptToEnvelope());
      uploadTexto(txt, function(ok){
        if(ok){
          snapBase();
          try{ localStorage.setItem("env_cache", txt); }catch(eq){}
          render();
        }
        cb(ok);
      });
    }catch(e){ cb(false); }
  }, function(){ cb(false); });
}
function setSaved(ok, msg){
  var el = document.getElementById("saveInfo");
  var d = new Date(), hh = pad(d.getHours()), mm = pad(d.getMinutes());
  if(ok){ el.className = "save"; el.innerHTML = "Salvo automaticamente ✓ " + hh + ":" + mm; }
  else { el.className = "save err"; el.innerHTML = "⚠ Erro ao salvar"; }
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function normalize(){
  if(!DB) DB = clone(EMBEDDED);
  if(!DB.config) DB.config = clone(EMBEDDED.config);
  var c = DB.config;
  if(c.escLEO==null) c.escLEO=25; if(c.escJM==null) c.escJM=25; if(c.escCEZAR==null) c.escCEZAR=50;
  if(c.socLEO==null) c.socLEO=50; if(c.socJM==null) c.socJM=50;
  if(c.repassePadrao==null) c.repassePadrao=10;
  if(c.marcioLEO==null) c.marcioLEO=300; if(c.marcioJM==null) c.marcioJM=300; if(c.marcioCEZAR==null) c.marcioCEZAR=600;
  DB.clientes = DB.clientes || [];
  DB.lanc = DB.lanc || [];
  DB.del = DB.del || [];
  DB.delCli = DB.delCli || [];
  for(var i=0;i<DB.lanc.length;i++){
    var l = DB.lanc[i];
    if(l.id==null) l.id = i+1;
    l.valor = +l.valor || 0;
    if(l.tipo==="ent"){
      if(l.dono!=="JM") l.dono="LEO";
      if(l.jaDiv==null) l.jaDiv=false;
      if(l.perc==null && !l.jaDiv) l.perc = c.repassePadrao;
    }else if(l.tipo==="esc"){
      if(l.sent!=="r") l.sent="d";
      if(l.pL==null) l.pL=c.escLEO; if(l.pJ==null) l.pJ=c.escJM; if(l.pC==null) l.pC=c.escCEZAR;
      if(l.sent==="r" && /marcio/i.test(String(l.nome||""))) l.marcio=true;
    }else if(l.tipo==="soc"){
      if(l.pL==null) l.pL=c.socLEO; if(l.pJ==null) l.pJ=c.socJM;
      if(l.pagador==null) l.pagador="";
    }
  }
  for(var j=0;j<DB.clientes.length;j++){ if(DB.clientes[j].id==null) DB.clientes[j].id=j+1; }
}
function nextId(){ var m=0; for(var i=0;i<DB.lanc.length;i++) if(DB.lanc[i].id>m) m=DB.lanc[i].id; return m+1; }
function nextCliId(){ var m=0; for(var i=0;i<DB.clientes.length;i++) if(DB.clientes[i].id>m) m=DB.clientes[i].id; return m+1; }
function findL(id){ for(var i=0;i<DB.lanc.length;i++) if(DB.lanc[i].id===id) return DB.lanc[i]; return null; }
function jsId(id){ return (typeof id==="string") ? "'"+id+"'" : id; }
function findCliId(id){ for(var i=0;i<DB.clientes.length;i++) if(DB.clientes[i].id===id) return DB.clientes[i]; return null; }

/* ===================== UTILS ===================== */
function pad(n){ return (n<10?"0":"")+n; }
function money(n){
  if(n==null||isNaN(n)) return "—";
  var neg = n<0; n = Math.abs(n);
  var s = n.toFixed(2).replace(".",",");
  var p = s.split(","), a = p[0], r = "";
  while(a.length>3){ r = "."+a.substring(a.length-3)+r; a = a.substring(0,a.length-3); }
  return (neg?"-":"")+"R$ "+a+r+","+p[1];
}
function parseBR(s){ if(s==null) return NaN; s=String(s).replace(/[^\d.,-]/g,""); if(s==="") return NaN; if(s.indexOf(",")>=0){ s=s.replace(/\./g,"").replace(",","."); } return parseFloat(s); }
function round2(x){ return Math.round(x*100)/100; }
function esc(s){ s=(s==null?"":String(s)); return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function mesAtual(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
function mesLabel(m){ if(!m) return "—"; var p=m.split("-"); return MESES[+p[1]-1]+"/"+p[0]; }
function mesLabelCurto(m){ if(!m) return "—"; var p=m.split("-"); return MESES[+p[1]-1].substring(0,3)+"/"+p[0].substring(2); }
function addMes(m,delta){ var p=m.split("-"), y=+p[0], mm=+p[1]-1+delta; y+=Math.floor(mm/12); mm=((mm%12)+12)%12; return y+"-"+pad(mm+1); }
function normNome(s){ s=String(s||"").toLowerCase(); s=s.replace(/\*+/g,"").replace(/já dividido/g,"").replace(/ja dividido/g,"").replace(/\(\s*\d+([.,]\d+)?\s*%\s*\)/g,"").replace(/[:.]+\s*$/,"").replace(/\s+/g," ").replace(/^\s+|\s+$/g,""); return s; }
function anosComDados(){
  var u={}, r=[], i, a;
  for(i=0;i<DB.lanc.length;i++){ a = String(DB.lanc[i].mes||"").split("-")[0]; if(a && !u[a]){ u[a]=1; r.push(a); } }
  a = String(mesAtual()).split("-")[0]; if(!u[a]){ u[a]=1; r.push(a); }
  r.sort();
  return r;
}
function repDe(l){
  if(l.tipo!=="ent" || l.jaDiv) return 0;
  if(l.rep!=null && l.rep!=="") return +l.rep || 0;
  return round2(l.valor * (+l.perc||0) / 100);
}
function findCli(nome, dono){
  var n = normNome(nome), i, c, best=null;
  for(i=0;i<DB.clientes.length;i++){ c=DB.clientes[i];
    if(normNome(c.nome)===n){ if(c.dono===dono) return c; if(!best) best=c; }
  }
  return best;
}

/* ===================== CÁLCULO DO MÊS ===================== */
function calcMes(mes){
  var c = DB.config;
  var r = { entJM:[], entLEO:[], escD:[], escR:[], soc:[],
    tEntJM:0, tEntLEO:0, repJM:0, repLEO:0,
    tEsc:0, tEscR:0, tSoc:0, escSem:0, socSem:0,
    escPago:{LEO:0,JM:0,CEZAR:0}, escDev:{LEO:0,JM:0,CEZAR:0}, escRec:{LEO:0,JM:0,CEZAR:0},
    balEsc:{LEO:0,JM:0,CEZAR:0}, socPago:{LEO:0,JM:0}, socDev:{LEO:0,JM:0}, balSoc:{LEO:0,JM:0} };
  for(var i=0;i<DB.lanc.length;i++){
    var l = DB.lanc[i];
    if(l.mes!==mes) continue;
    var v = +l.valor||0;
    if(l.tipo==="ent"){
      var rep = repDe(l);
      if(l.dono==="JM"){ r.entJM.push(l); r.tEntJM+=v; r.repJM+=rep; }
      else { r.entLEO.push(l); r.tEntLEO+=v; r.repLEO+=rep; }
    }else if(l.tipo==="esc"){
      var shL=v*(+l.pL||0)/100, shJ=v*(+l.pJ||0)/100, shC=v*(+l.pC||0)/100;
      if(l.sent==="r"){
        r.escR.push(l); r.tEscR+=v;
        if(l.pagador){ r.balEsc[l.pagador]-=v; r.balEsc.LEO+=shL; r.balEsc.JM+=shJ; r.balEsc.CEZAR+=shC;
          r.escRec.LEO+=shL; r.escRec.JM+=shJ; r.escRec.CEZAR+=shC; r.escRec[l.pagador]-=v; }
        else r.escSem+=v;
      }else{
        r.escD.push(l); r.tEsc+=v;
        if(l.pagador){ r.balEsc[l.pagador]+=v; r.escPago[l.pagador]+=v;
          r.balEsc.LEO-=shL; r.balEsc.JM-=shJ; r.balEsc.CEZAR-=shC;
          r.escDev.LEO+=shL; r.escDev.JM+=shJ; r.escDev.CEZAR+=shC; }
        else r.escSem+=v;
      }
    }else if(l.tipo==="soc"){
      r.soc.push(l); r.tSoc+=v;
      var sL=v*(+l.pL||0)/100, sJ=v*(+l.pJ||0)/100;
      if(l.pagador){ r.balSoc[l.pagador]+=v; r.socPago[l.pagador]+=v;
        r.balSoc.LEO-=sL; r.balSoc.JM-=sJ; r.socDev.LEO+=sL; r.socDev.JM+=sJ; }
      else r.socSem+=v;
    }
  }
  r.balComb = {
    LEO: round2(r.balEsc.LEO + r.balSoc.LEO - r.repLEO + r.repJM),
    JM:  round2(r.balEsc.JM + r.balSoc.JM - r.repJM + r.repLEO),
    CEZAR: round2(r.balEsc.CEZAR)
  };
  r.balSocRep = {
    LEO: round2(r.balSoc.LEO - r.repLEO + r.repJM),
    JM:  round2(r.balSoc.JM - r.repJM + r.repLEO)
  };
  return r;
}

function marcioTotal(){ var c=DB.config; return (+c.marcioLEO||0)+(+c.marcioJM||0)+(+c.marcioCEZAR||0); }
function toggleMarcio(){
  var l = marcioDoMes(MES);
  if(l){
    if(!confirm("Desmarcar o recebimento do Marcio em "+mesLabel(MES)+"?\n(O lançamento de "+money(l.valor)+" será removido do acerto.)")) return;
    var nd=[]; for(var i=0;i<DB.lanc.length;i++) if(DB.lanc[i].id!==l.id) nd.push(DB.lanc[i]);
    DB.lanc=nd; DB.del.push({ id:l.id, t:now() }); save(); toast("Marcio desmarcado"); render(); return;

  DB.lanc.push({ id:genId(), tipo:"esc", mes:MES, nome:"Marcio (aluguel da sala)", valor:round2(t), sent:"r", pagador:"LEO",

function settle(bal){
  var debt=[], cred=[], k, i, j, res=[];
  for(k in bal){ var v=round2(bal[k]); if(v<-0.005) debt.push({p:k,v:-v}); else if(v>0.005) cred.push({p:k,v:v}); }
  debt.sort(function(a,b){return b.v-a.v;}); cred.sort(function(a,b){return b.v-a.v;});
  i=0; j=0;
  while(i<debt.length && j<cred.length){
    var x = Math.min(debt[i].v, cred[j].v);
    if(x>0.005) res.push({de:debt[i].p, para:cred[j].p, v:round2(x)});
    debt[i].v-=x; cred[j].v-=x;
    if(debt[i].v<=0.005) i++;
    if(cred[j].v<=0.005) j++;
  }
  return res;
}

function pcL(){ return ""; }
function ordenaPag(arr, ordem){
  var c=[], i;
  for(i=0;i<arr.length;i++) c.push({l:arr[i], i:i});
  c.sort(function(a,b){
    var oa=ordem[a.l.pagador]!=null?ordem[a.l.pagador]:9, ob=ordem[b.l.pagador]!=null?ordem[b.l.pagador]:9;
    if(oa!==ob) return oa-ob;
    return a.i-b.i;
  });
  var r=[];
  for(i=0;i<c.length;i++) r.push(c[i].l);
  return r;
}
function valCor(v){ v=round2(v); var c = v>0.005?"#0d6b47":(v<-0.005?"#a02617":"#666"); return '<span style="font-weight:bold;color:'+c+'">'+(v>0.005?"+":"")+money(v)+'</span>'; }

  var e=document.getElementById("fechResumo"), b=document.getElementById("btnResumoFech");

  var aberto = e.style.display!=="none";

function resumoPessoas(pago, dev, bal, ps, rec, recLabel){
  var h='<table style="margin-bottom:10px"><thead><tr><th></th>';
  for(var i=0;i<ps.length;i++) h+='<th class="r">'+PNOME[ps[i]]+'</th>';
  h+='</tr></thead><tbody><tr><td class="nome">Pagou</td>';
  for(var a=0;a<ps.length;a++) h+='<td class="r">'+money(pago[ps[a]])+'</td>';
  h+='</tr><tr><td class="nome">Parte que lhe cabe</td>';
  for(var b=0;b<ps.length;b++) h+='<td class="r">'+money(dev[ps[b]])+'</td>';
  if(rec){
    var temRec=false, d;
    for(d=0;d<ps.length;d++) if(Math.abs(rec[ps[d]])>0.005) temRec=true;
    if(temRec){
      h+='</tr><tr><td class="nome">'+(recLabel||"Receitas")+'</td>';
      for(d=0;d<ps.length;d++){ var rv=round2(rec[ps[d]]);
        h+='<td class="r" style="color:'+(rv>0.005?"#0d6b47":(rv<-0.005?"#a02617":"#666"))+'">'+(rv>0.005?"+":"")+money(rv)+'</td>';
      }
    }
  }
  h+='</tr><tr><td class="nome">Saldo (+ recebe / − paga)</td>';
  for(var c=0;c<ps.length;c++){ var v=round2(bal[ps[c]]); h+='<td class="r" style="font-weight:bold;color:'+(v>0.005?"#0d6b47":(v<-0.005?"#a02617":"#666"))+'">'+money(v)+'</td>'; }
  h+='</tr></tbody></table>';
  return h;
}

function renderTotais(){
  var anos = anosComDados();
  var anoSel = document.getElementById("totAno") ? document.getElementById("totAno").value : String(MES).split("-")[0];
  var okA=false; for(var z=0;z<anos.length;z++) if(anos[z]===anoSel) okA=true;
  if(!okA) anoSel = anos[anos.length-1];
  var h='<div class="mesnav">Ano: <select id="totAno" onchange="render()">';
  for(var i=0;i<anos.length;i++) h+='<option value="'+anos[i]+'"'+(anos[i]===anoSel?" selected":"")+'>'+anos[i]+'</option>';
  h+='</select></div>';
  h+='<div class="sec"><h3>Totais de '+anoSel+'</h3><div class="scroll" style="max-height:560px"><table><thead><tr><th>Mês</th><th class="r">Entradas JM</th><th class="r">Entradas Leo</th><th class="r">Entradas total</th><th class="r">Desp. escritório</th><th class="r">Desp. sociedade</th></tr></thead><tbody>';
  var sJM=0,sLEO=0,sE=0,sS=0;
  for(var mm=1;mm<=12;mm++){

    sJM+=m.tEntJM; sLEO+=m.tEntLEO; sE+=m.tEsc; sS+=m.tSoc;
    h+='<tr class="tap" onclick="irMes(\''+mes+'\')"><td class="nome">'+MESES[mm-1]+'</td><td class="r">'+money(m.tEntJM)+'</td><td class="r">'+money(m.tEntLEO)+'</td><td class="r">'+money(m.tEntJM+m.tEntLEO)+'</td><td class="r">'+money(m.tEsc)+'</td><td class="r">'+money(m.tSoc)+'</td></tr>';
  }
  h+='<tr class="tot"><td>Total '+anoSel+'</td><td class="r">'+money(sJM)+'</td><td class="r">'+money(sLEO)+'</td><td class="r">'+money(sJM+sLEO)+'</td><td class="r">'+money(sE)+'</td><td class="r">'+money(sS)+'</td></tr>';

function saveConfig(){
  var c=DB.config;
  var eL=parseBR(gv("cfg_escLEO")), eJ=parseBR(gv("cfg_escJM")), eC=parseBR(gv("cfg_escCEZAR"));
  var sL=parseBR(gv("cfg_socLEO")), sJ=parseBR(gv("cfg_socJM")), rp=parseBR(gv("cfg_rep"));
  var mL=parseBR(gv("cfg_mLEO")), mJ=parseBR(gv("cfg_mJM")), mC=parseBR(gv("cfg_mCEZAR"));
  if(isNaN(eL)||isNaN(eJ)||isNaN(eC)||isNaN(sL)||isNaN(sJ)||isNaN(rp)||isNaN(mL)||isNaN(mJ)||isNaN(mC)){ alert("Preencha todos os campos com números."); return; }
  if(Math.abs(eL+eJ+eC-100)>0.01 && !confirm("A divisão do escritório soma "+(eL+eJ+eC)+"% (não fecha 100%). Salvar mesmo assim?")) return;
  if(Math.abs(sL+sJ-100)>0.01 && !confirm("A divisão da sociedade soma "+(sL+sJ)+"% (não fecha 100%). Salvar mesmo assim?")) return;

function entSug(){
  var q=normNome(gv("e_nome")), box=document.getElementById("e_sug");
  if(q.length<2){ box.style.display="none"; return; }
  var seen={}, arr=[], i;
  for(i=0;i<DB.clientes.length;i++){ var c=DB.clientes[i], n=normNome(c.nome);
    if(n.indexOf(q)>=0 && !seen[n]){ seen[n]=1; arr.push({n:c.nome, p:c.perc, d:c.dono}); if(arr.length>=8) break; }
  }
  if(!arr.length){ box.style.display="none"; return; }
  var h="";
  for(i=0;i<arr.length;i++) h+='<div onclick="entPick(\''+esc(arr[i].n).replace(/'/g,"\\'")+'\','+(arr[i].p!=null?arr[i].p:"null")+')">'+esc(arr[i].n)+' <span class="sub">'+(arr[i].p!=null?arr[i].p+"%":"")+(arr[i].d?" · "+PNOME[arr[i].d]:"")+'</span></div>';
  box.innerHTML=h; box.style.display="block";
}
function entPick(n,p){
  document.getElementById("e_nome").value=n;
  if(p!=null) document.getElementById("e_perc").value=p;
  document.getElementById("e_sug").style.display="none";
  document.getElementById("e_rep").value="";
  entCalc();
}
function entPercSug(){
  if(gv("e_perc")!=="") return;
  var c=findCli(gv("e_nome"), gv("e_dono"));
  document.getElementById("e_perc").value = c&&c.perc!=null ? c.perc : DB.config.repassePadrao;
  entCalc();
}
function entCalc(){
  var jd = gv("e_jadiv")==="s";
  document.getElementById("e_perc").disabled = jd;
  document.getElementById("e_rep").disabled = jd;
  if(jd){ document.getElementById("e_rep").value=""; return; }
  var v=parseBR(gv("e_valor")), p=parseBR(gv("e_perc"));
  if(!isNaN(v)&&!isNaN(p)) document.getElementById("e_rep").value = round2(v*p/100).toFixed(2).replace(".",",");
}
function entRepManual(){ /* usuário digitou repasse manualmente; não recalcular por cima */ }
function saveEnt(id){
  var nome=gv("e_nome"), v=parseBR(gv("e_valor"));
  if(!nome){ alert("Informe o cliente."); return; }
  if(isNaN(v)||v<=0){ alert("Informe o valor recebido."); return; }
  var jd = gv("e_jadiv")==="s";
  var p = parseBR(gv("e_perc")); if(isNaN(p)) p=null;
  var rep = parseBR(gv("e_rep")); if(isNaN(rep)) rep=null;
  var calc = (p!=null) ? round2(v*p/100) : null;
  var l = id?findL(id):null;
  if(!l){ l={ id:genId(), tipo:"ent" }; DB.lanc.push(l); }
  l.mes=mesForm(); l.nome=nome; l.valor=v; l.dono=gv("e_dono"); l.jaDiv=jd;
  l.perc = jd?null:p;
  l.rep = (jd||rep==null||calc==null||Math.abs(rep-calc)<=0.01) ? null : rep;
  l.obs=gv("e_obs")||null;
  l.up=now();
  if(!jd && document.getElementById("e_savecli").checked && p!=null){
    var c=findCli(nome, l.dono);
    if(c){ if(c.perc!==p){ c.perc=p; c.up=now(); } if(!c.dono){ c.dono=l.dono; c.up=now(); } }
    else DB.clientes.push({ id:genId(), nome:nome, dono:l.dono, perc:p, up:now() });
  }
  save(); closeModal(); toast("Entrada salva"); render();
}

/* ===================== CRIPTOGRAFIA ===================== */
function utf8Enc(s){
  var out=[], i, c, c2;
  for(i=0;i<s.length;i++){
    c = s.charCodeAt(i);
    if(c<128) out.push(c);
    else if(c<2048) out.push(192|(c>>6), 128|(c&63));
    else if(c>=0xD800 && c<0xDC00 && i+1<s.length && s.charCodeAt(i+1)>=0xDC00 && s.charCodeAt(i+1)<0xE000){
      c2 = s.charCodeAt(i+1);
      var u = 0x10000 + ((c-0xD800)<<10) + (c2-0xDC00);
      out.push(240|(u>>18), 128|((u>>12)&63), 128|((u>>6)&63), 128|(u&63));
      i++;
    }
    else out.push(224|(c>>12), 128|((c>>6)&63), 128|(c&63));
  }
  return out;
}
function utf8Dec(b){
  var out=[], i=0, c, c2, c3, c4, u;
  while(i<b.length){
    c = b[i++];
    if(c<128) out.push(String.fromCharCode(c));
    else if(c<224){ c2=b[i++]; out.push(String.fromCharCode(((c&31)<<6)|(c2&63))); }
    else if(c<240){ c2=b[i++]; c3=b[i++]; out.push(String.fromCharCode(((c&15)<<12)|((c2&63)<<6)|(c3&63))); }
    else{ c2=b[i++]; c3=b[i++]; c4=b[i++]; u=(((c&7)<<18)|((c2&63)<<12)|((c3&63)<<6)|(c4&63))-0x10000;
      out.push(String.fromCharCode(0xD800+(u>>10), 0xDC00+(u&1023))); }
  }
  return out.join("");
}
var SHA_K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
function sha256(msg){
  var b=utf8Enc(msg), l=b.length, i, j;
  b.push(128);
  while(b.length%64!==56) b.push(0);
  var hi=Math.floor(l/536870912)>>>0, lo=(l*8)>>>0;
  b.push((hi>>>24)&255,(hi>>>16)&255,(hi>>>8)&255,hi&255,(lo>>>24)&255,(lo>>>16)&255,(lo>>>8)&255,lo&255);
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  var w=[], a,b2,c,d,e,f,g,h2,t1,t2,s0,s1,x,y;
  for(i=0;i<b.length;i+=64){
    for(j=0;j<16;j++) w[j]=((b[i+j*4]<<24)|(b[i+j*4+1]<<16)|(b[i+j*4+2]<<8)|b[i+j*4+3])>>>0;
    for(j=16;j<64;j++){
      x=w[j-15]; y=w[j-2];
      s0=(((x>>>7)|(x<<25))^((x>>>18)|(x<<14))^(x>>>3))>>>0;
      s1=(((y>>>17)|(y<<15))^((y>>>19)|(y<<13))^(y>>>10))>>>0;
      w[j]=(w[j-16]+s0+w[j-7]+s1)>>>0;
    }
    a=H[0];b2=H[1];c=H[2];d=H[3];e=H[4];f=H[5];g=H[6];h2=H[7];
    for(j=0;j<64;j++){
      s1=(((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7)))>>>0;
      t1=(h2+s1+(((e&f)^((~e)&g))>>>0)+SHA_K[j]+w[j])>>>0;
      s0=(((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10)))>>>0;
      t2=(s0+(((a&b2)^(a&c)^(b2&c))>>>0))>>>0;
      h2=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b2;b2=a;a=(t1+t2)>>>0;
    }
    H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b2)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;
    H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+h2)>>>0;
  }
  var out="", hx;
  for(i=0;i<8;i++){ hx=H[i].toString(16); while(hx.length<8) hx="0"+hx; out+=hx; }
  return out;
}
function kdf(senha, salt){
  var h = sha256(String(salt) + "|" + String(senha)), i;
  for(i=0;i<8000;i++) h = sha256(h + "|" + senha);
  return h;
}
function hexToBytes(hx){ var o=[], i; for(i=0;i<hx.length;i+=2) o.push(parseInt(hx.substring(i,i+2),16)); return o; }
function rc4(key, data){
  var S=[], i, j=0, t, n, out=[], k=key.length;
  for(i=0;i<256;i++) S[i]=i;
  for(i=0;i<256;i++){ j=(j+S[i]+key[i%k])&255; t=S[i]; S[i]=S[j]; S[j]=t; }
  i=0; j=0;
  for(n=0;n<3072;n++){ i=(i+1)&255; j=(j+S[i])&255; t=S[i]; S[i]=S[j]; S[j]=t; }
  for(n=0;n<data.length;n++){ i=(i+1)&255; j=(j+S[i])&255; t=S[i]; S[i]=S[j]; S[j]=t; out.push(data[n]^S[(S[i]+S[j])&255]); }
  return out;
}
var B64A="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
function b64Enc(b){
  var o=[], i, c1, c2, c3;
  for(i=0;i<b.length;i+=3){
    c1=b[i]; c2=(i+1<b.length)?b[i+1]:0; c3=(i+2<b.length)?b[i+2]:0;
    o.push(B64A.charAt(c1>>2));
    o.push(B64A.charAt(((c1&3)<<4)|(c2>>4)));
    o.push((i+1<b.length)?B64A.charAt(((c2&15)<<2)|(c3>>6)):"=");
    o.push((i+2<b.length)?B64A.charAt(c3&63):"=");
  }
  return o.join("");
}
var B64M=null;
function b64Dec(s){
  var o=[], i;
  if(!B64M){ B64M={}; for(i=0;i<64;i++) B64M[B64A.charAt(i)]=i; }
  for(i=0;i<s.length;i+=4){
    var a=B64M[s.charAt(i)], b=B64M[s.charAt(i+1)], c=s.charAt(i+2), d=s.charAt(i+3);
    var v2=(c==="="||c==="")?0:B64M[c], v3=(d==="="||d==="")?0:B64M[d];
    o.push(((a<<2)|(b>>4))&255);
    if(c!=="=" && c!=="") o.push((((b&15)<<4)|(v2>>2))&255);
    if(d!=="=" && d!=="") o.push((((v2&3)<<6)|v3)&255);
  }
  return o;
}
function randSalt(){ return String(new Date().getTime()) + "-" + Math.floor(Math.random()*1e9) + "-" + Math.floor(Math.random()*1e9); }
function encryptToEnvelope(){
  var plain = utf8Enc("BRSVOK|" + JSON.stringify(DB));
  var nonce = randSalt();
  var cipher = rc4(hexToBytes(sha256(KEY + "|" + nonce)), plain);
  return { enc:"BRSV1", salt:ENCSALT, nonce:nonce, data:b64Enc(cipher) };
}
function decryptEnvelope(env, keyHex){
  try{
    var plain = rc4(hexToBytes(sha256(keyHex + "|" + env.nonce)), b64Dec(env.data));
    var s = utf8Dec(plain);
    if(s.substring(0,7) !== "BRSVOK|") return null;
    return JSON.parse(s.substring(7));
  }catch(e){ return null; }
}

/* ===================== SINCRONIZAÇÃO ===================== */
function now(){ return new Date().getTime(); }
function genId(){ return "x" + now().toString(36) + Math.floor(Math.random()*1679616).toString(36); }
var BASE = null;
function snapBase(){
  var b = { lanc:{}, cli:{}, cfg:(DB.config.up||0) }, i;
  for(i=0;i<DB.lanc.length;i++) b.lanc[DB.lanc[i].id] = DB.lanc[i].up||0;
  for(i=0;i<DB.clientes.length;i++) b.cli[DB.clientes[i].id] = DB.clientes[i].up||0;
  BASE = b;
}
function descItem(x, tipo){
  if(!x) return "(excluído)";
  if(tipo==="cliente") return (x.nome||"?")+" ("+(x.perc!=null?x.perc+"%":"")+")";
  return (x.nome||"?")+" — "+money(x.valor)+" — "+mesLabel(x.mes);
}
function mergeColl(locArr, remArr, locDel, remDel, baseMap, tipo){
  var L={}, R={}, dL={}, dR={}, i, k, ids=[], seen={};
  locArr=locArr||[]; remArr=remArr||[]; locDel=locDel||[]; remDel=remDel||[];
  for(i=0;i<locArr.length;i++) L[locArr[i].id]=locArr[i];
  for(i=0;i<remArr.length;i++) R[remArr[i].id]=remArr[i];
  for(i=0;i<locDel.length;i++){ var a=locDel[i]; if(dL[a.id]==null||a.t>dL[a.id]) dL[a.id]=a.t; }
  for(i=0;i<remDel.length;i++){ var c=remDel[i]; if(dR[c.id]==null||c.t>dR[c.id]) dR[c.id]=c.t; }
  function ad(x){ if(!seen[x]){ seen[x]=1; ids.push(x); } }
  for(k in L) ad(k); for(k in R) ad(k); for(k in dL) ad(k); for(k in dR) ad(k);
  var dels={};
  for(k in dL) dels[k]=dL[k];
  for(k in dR) if(dels[k]==null||dR[k]>dels[k]) dels[k]=dR[k];
  var itens=[];
  for(i=0;i<ids.length;i++){
    var id=ids[i], l=L[id]||null, r=R[id]||null;
    var b = (baseMap && baseMap[id]!=null) ? baseMap[id] : null;
    var lu=0, ru=0;
    if(l) lu=l.up||0;
    if(r) ru=r.up||0;
    var locCh = (b===null && l!=null) || (l!=null && lu>(b||0)) || (l==null && b!==null && dL[id]!=null);
    var remCh = (b===null && r!=null) || (r!=null && ru>(b||0)) || (r==null && b!==null && dR[id]!=null);
    var escolhido;
    if(locCh && remCh && !(l&&r&&lu===ru)){
      var manter = confirm("CONFLITO DE SINCRONIZAÇÃO ("+tipo+"):\n\nNESTE APARELHO: "+descItem(l,tipo)+"\nNO OUTRO APARELHO/NUVEM: "+descItem(r,tipo)+"\n\nOK = manter o DESTE aparelho\nCancelar = usar o do outro aparelho");
      if(manter) escolhido = l; else escolhido = r;
      if(escolhido) escolhido.up = now();
    }
    else if(remCh) escolhido = r;
    else escolhido = l;
    if(escolhido && !(dels[id]!=null && dels[id] > (escolhido.up||0))) itens.push(escolhido);
  }
  var delArr=[], corte = now() - 15552000000;
  for(k in dels) if(dels[k] > corte) delArr.push({ id:k, t:dels[k] });
  return { itens:itens, del:delArr };
}
function mergeDB(loc, rem){
  var base = BASE || { lanc:{}, cli:{}, cfg:0 };
  var out = { config:loc.config, clientes:[], lanc:[], del:[], delCli:[] };
  var cl = loc.config.up||0, cr = 0;
  if(rem.config && rem.config.up) cr = rem.config.up;
  if(cl>base.cfg && cr>base.cfg && cl!==cr){
    if(!confirm("CONFLITO: as CONFIGURAÇÕES foram alteradas nos dois aparelhos.\nOK = manter as deste aparelho · Cancelar = usar as do outro")) out.config = rem.config;
    out.config.up = now();
  } else if(cr>cl && rem.config) out.config = rem.config;
  var senhaH = loc.config.senhaHash, senhaS = loc.config.senhaSalt;
  if(senhaH){ out.config.senhaHash = senhaH; out.config.senhaSalt = senhaS; }
  var ml = mergeColl(loc.lanc, rem.lanc, loc.del, rem.del, base.lanc, "lançamento");
  out.lanc = ml.itens; out.del = ml.del;
  var mc = mergeColl(loc.clientes, rem.clientes, loc.delCli, rem.delCli, base.cli, "cliente");
  out.clientes = mc.itens; out.delCli = mc.del;
  return out;
}

/* ===================== SENHA ===================== */
function hashSenha(s, salt){
  var str = String(salt) + "|" + String(s), h1 = 5381, h2 = 52711, i, c;
  for(i=0;i<str.length;i++){
    c = str.charCodeAt(i);
    h1 = ((h1 * 33) ^ c) >>> 0;
    h2 = ((h2 * 37) ^ c) >>> 0;
  }
  return h1.toString(16) + "-" + h2.toString(16);
}
function showLock(){
  var criar = (!ENVELOPE && (!DB || !DB.config || !DB.config.senhaHash));
  var h = '<h2>Entradas e Saídas</h2><div class="ls">Brais e Silva — Advocacia</div>';
  if(criar){
    h += '<div style="color:#f2e3b3;font-size:12px;margin-bottom:4px">Primeiro acesso: defina a senha do app. Os dados serão criptografados com ela.</div>';
    h += '<label>Nova senha</label><input type="password" id="lk_s1" onkeypress="if(event.keyCode===13)lockOk()">';
    h += '<label>Repita a senha</label><input type="password" id="lk_s2" onkeypress="if(event.keyCode===13)lockOk()">';
    h += '<button onclick="lockOk()">Criar senha e entrar</button>';
  }else{
    h += '<label>Senha</label><input type="password" id="lk_s1" onkeypress="if(event.keyCode===13)lockOk()">';
    h += '<button onclick="lockOk()">Entrar</button>';
  }
  h += '<div class="lockerr" id="lk_err"></div>';
  document.getElementById("lockbox").innerHTML = h;
  document.getElementById("lock").style.display = "";
  try{ document.getElementById("lk_s1").focus(); }catch(e){}
}
function lockOk(){
  var err = document.getElementById("lk_err");
  var s1 = document.getElementById("lk_s1").value;
  var criar = (!ENVELOPE && (!DB || !DB.config || !DB.config.senhaHash));
  if(criar){
    var s2 = document.getElementById("lk_s2").value;
    if(!s1 || s1.length < 4){ err.innerHTML = "A senha precisa ter pelo menos 4 caracteres."; return; }
    if(s1 !== s2){ err.innerHTML = "As senhas não conferem."; return; }
  } else if(!s1){ err.innerHTML = "Digite a senha."; return; }
  err.innerHTML = '<span style="color:#c9ab5e">Verificando…</span>';
  setTimeout(function(){ lockGo(s1, criar); }, 40);
}
function lockGo(s1, criar){
  var err = document.getElementById("lk_err");
  if(criar){
    var c = DB.config;
    c.senhaSalt = randSalt();
    c.senhaHash = hashSenha(s1, c.senhaSalt);
    ENCSALT = randSalt();
    KEY = kdf(s1, ENCSALT);
    save(true);
    desbloquear();
    toast("Senha criada — dados criptografados");
    return;
  }
  if(ENVELOPE){
    var key = kdf(s1, ENVELOPE.salt);
    var d = decryptEnvelope(ENVELOPE, key);
    if(!d){
      err.innerHTML = "Senha incorreta.";
      document.getElementById("lk_s1").value = "";
      try{ document.getElementById("lk_s1").focus(); }catch(e){}
      return;
    }
    DB = d; normalize();
    KEY = key; ENCSALT = ENVELOPE.salt; ENVELOPE = null;
    desbloquear();
    return;
  }
  /* arquivo ainda em texto puro, mas com senha definida: migra p/ criptografado */
  if(hashSenha(s1, DB.config.senhaSalt) === DB.config.senhaHash){
    ENCSALT = randSalt();
    KEY = kdf(s1, ENCSALT);
    save(true);
    desbloquear();
    toast("Dados criptografados");
    return;
  }
  err.innerHTML = "Senha incorreta.";
  document.getElementById("lk_s1").value = "";
  try{ document.getElementById("lk_s1").focus(); }catch(e){}
}
function desbloquear(){
  snapBase();
  document.getElementById("lock").style.display = "none";
  render();
  setTimeout(importInbox, 300);
}
function importInbox(){ }
function openSenha(){
  var h='<div class="mh"><button class="x" onclick="closeModal()">×</button><h2>Alterar senha de acesso</h2></div><div class="mb"><div class="fg">';
  h+='<div class="fld full"><label>Senha atual</label><input type="password" id="sn_atual"></div>';
  h+='<div class="fld"><label>Nova senha</label><input type="password" id="sn_n1"></div>';
  h+='<div class="fld r2"><label>Repita a nova senha</label><input type="password" id="sn_n2"></div>';
  h+='</div></div><div class="mf"><button class="btn2" onclick="closeModal()">Cancelar</button><button class="btn2 go" onclick="saveSenha()">Salvar nova senha</button></div>';
  openModal(h);
}
function saveSenha(){
  var c = DB.config;
  if(hashSenha(document.getElementById("sn_atual").value, c.senhaSalt) !== c.senhaHash){ alert("Senha atual incorreta."); return; }
  var n1 = document.getElementById("sn_n1").value, n2 = document.getElementById("sn_n2").value;
  if(!n1 || n1.length < 4){ alert("A nova senha precisa ter pelo menos 4 caracteres."); return; }
  if(n1 !== n2){ alert("As novas senhas não conferem."); return; }
  c.senhaSalt = randSalt();
  c.senhaHash = hashSenha(n1, c.senhaSalt);
  ENCSALT = randSalt();
  KEY = kdf(n1, ENCSALT);
  save(); closeModal(); toast("Senha alterada — dados recriptografados");
}

/* ===================== BACKUP / MISC ===================== */
function backup(){
  var d = new Date(), stamp = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + "_" + pad(d.getHours()) + pad(d.getMinutes());
  api("copyfile", { fileid: PC.fileid, tofolderid: PC.folderid, toname: "Entradas e Saídas_backup_" + stamp + ".json" },
    function(o){ toast("Backup criado na nuvem"); },
    function(err){ alert("Erro no backup: " + err); });
}
function reload(){
  if(!confirm("Recarregar os dados da nuvem? (alterações não salvas na tela são descartadas)")) return;
  baixarEnvelope(function(env){
    if(env && env.enc === "BRSV1" && KEY && env.salt === ENCSALT){
      var d = decryptEnvelope(env, KEY);
      if(d){ DB = d; normalize(); snapBase(); render(); toast("Dados recarregados"); return; }
    }
    ENVELOPE = env; DB = null; KEY = null; showLock();
  }, function(err){ alert("Sem conexão com o pCloud:\n" + err); });
}
function toast(m){ var t=document.getElementById("toast"); t.innerHTML=m; t.className="toast on"; setTimeout(function(){ t.className="toast"; },1900); }
function init(){
  MES = addMes(mesAtual(), -1);
  if(!PC.auth || !PC.host){ showLogin(); return; }
  iniciarComToken();
}
window.onload = init;
